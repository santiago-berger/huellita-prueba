<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Huellita - Directorio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/estilos.css" rel="stylesheet">
</head>
<body>
  <div id="navbar"></div>

  <div class="container my-5">
    <h2 class="seccion-titulo">Directorio de veterinarias y refugios</h2>
    <p class="text-muted mb-4">Contactos de Formosa para consultar si recibieron a tu mascota.</p>

    <!-- Filtro por tipo -->
    <div class="mb-4">
      <label class="form-label">Filtrar por tipo:</label>
      <select id="filtro-tipo" class="form-select w-auto d-inline-block">
        <option value="">Todos</option>
        <option value="veterinaria">Veterinarias</option>
        <option value="refugio">Refugios</option>
      </select>
    </div>

    <div id="listado" class="row g-3"></div>
  </div>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/comun.js"></script>
  <script>
    generarNavbar('directorio');
    generarFooter();

    // RP-14: carga el directorio, con filtro opcional por tipo
    async function cargarDirectorio() {
      const cont = document.getElementById('listado');
      const tipo = document.getElementById('filtro-tipo').value;
      let url = '/establecimientos';
      if (tipo) url += '?tipo=' + tipo;

      try {
        const resp = await fetch(url);
        const lista = await resp.json();
        if (lista.length === 0) {
          cont.innerHTML = '<div class="col-12"><div class="alert alert-info">No hay establecimientos para mostrar.</div></div>';
          return;
        }
        cont.innerHTML = lista.map((e) => `
          <div class="col-md-6">
            <div class="card card-mascota p-3">
              <div class="d-flex justify-content-between align-items-start">
                <h3 class="h5 mb-1">${e.nombre}</h3>
                <span class="badge-estado ${e.tipo === 'veterinaria' ? 'estado-reencontrada' : 'estado-encontrada'}">
                  ${e.tipo === 'veterinaria' ? 'Veterinaria' : 'Refugio'}
                </span>
              </div>
              ${e.direccion ? `<p class="mb-1 text-muted">${e.direccion}</p>` : ''}
              ${e.telefono ? `<p class="mb-0"><strong>Tel:</strong> ${e.telefono}</p>` : ''}
            </div>
          </div>
        `).join('');
      } catch (err) {
        cont.innerHTML = '<div class="col-12"><div class="alert alert-danger">No se pudo cargar el directorio.</div></div>';
      }
    }

    document.getElementById('filtro-tipo').addEventListener('change', cargarDirectorio);
    cargarDirectorio();
  </script>
</body>
</html>
