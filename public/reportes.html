<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Huellita - Mascotas perdidas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/estilos.css" rel="stylesheet">
</head>
<body>
  <div id="navbar"></div>

  <div class="container my-5">
    <h2 class="seccion-titulo">Mascotas perdidas</h2>

    <!-- RP-08: filtros -->
    <div class="card card-mascota p-3 mb-4">
      <div class="row g-2 align-items-end">
        <div class="col-md-4">
          <label class="form-label mb-1">Especie</label>
          <select id="filtro-especie" class="form-select">
            <option value="">Todas</option>
            <option value="Perro">Perro</option>
            <option value="Gato">Gato</option>
            <option value="Otro">Otro</option>
          </select>
        </div>
        <div class="col-md-5">
          <label class="form-label mb-1">Zona o barrio</label>
          <input type="text" id="filtro-zona" class="form-control" placeholder="Ej: San Antonio">
        </div>
        <div class="col-md-3">
          <button id="btn-filtrar" class="btn btn-huellita w-100">Filtrar</button>
        </div>
      </div>
    </div>

    <div id="listado" class="row g-4"></div>
  </div>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/comun.js"></script>
  <script>
    generarNavbar('reportes');
    generarFooter();

    // RP-07 y RP-08: carga el listado, opcionalmente con filtros
    async function cargarReportes() {
      const cont = document.getElementById('listado');
      const especie = document.getElementById('filtro-especie').value;
      const zona = document.getElementById('filtro-zona').value.trim();

      let url = '/reportes?estado=Perdida';
      if (especie) url += '&especie=' + encodeURIComponent(especie);
      if (zona) url += '&zona=' + encodeURIComponent(zona);

      cont.innerHTML = '<p class="text-muted">Cargando...</p>';
      try {
        const resp = await fetch(url);
        const reportes = await resp.json();
        if (reportes.length === 0) {
          cont.innerHTML = '<div class="col-12"><div class="alert alert-info">No se encontraron mascotas perdidas con esos criterios.</div></div>';
          return;
        }
        cont.innerHTML = reportes.map((r) => `
          <div class="col-md-4">
            <a href="ficha.html?id=${r.id}" class="text-decoration-none">
              <div class="card card-mascota">
                <img src="${r.foto_url || 'img/sin-foto.svg'}" class="foto" alt="Mascota"
                     onerror="this.src='img/sin-foto.svg'">
                <div class="card-body">
                  <h3 class="card-title h5">${r.nombre_mascota || 'Mascota ' + r.especie}</h3>
                  <p class="mb-1 text-muted">${r.especie} &middot; ${r.zona}</p>
                  <p class="mb-2 small text-muted">Perdida el ${r.fecha}</p>
                  <span class="badge-estado estado-perdida">Perdida</span>
                </div>
              </div>
            </a>
          </div>
        `).join('');
      } catch (err) {
        cont.innerHTML = '<div class="col-12"><div class="alert alert-danger">No se pudieron cargar las mascotas.</div></div>';
      }
    }

    document.getElementById('btn-filtrar').addEventListener('click', cargarReportes);
    cargarReportes();
  </script>
</body>
</html>
