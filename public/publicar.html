<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Huellita - Publicar caso</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="css/estilos.css" rel="stylesheet" />
    <!-- Leaflet -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
  </head>
  <body>
    <div id="navbar"></div>

    <div class="container my-5">
      <div class="row justify-content-center">
        <div class="col-md-8">
          <div class="card card-mascota p-4">
            <h2 class="h4 mb-3" id="titulo-form">
              Reportar una mascota perdida
            </h2>
            <div id="msg-form"></div>

            <!-- Tipo de reporte (RP-04 perdida / RP-12 encontrada) -->
            <div class="mb-3">
              <label class="form-label">Tipo de reporte</label>
              <select id="tipo" class="form-select">
                <option value="Perdida">Perdi mi mascota</option>
                <option value="Encontrada">Encontre una mascota</option>
              </select>
            </div>

            <div class="mb-3" id="campo-nombre">
              <label class="form-label">Nombre de la mascota</label>
              <input
                type="text"
                id="nombre_mascota"
                class="form-control"
                placeholder="Ej: Rocky"
              />
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Especie *</label>
                <select id="especie" class="form-select">
                  <option value="">Seleccionar...</option>
                  <option value="perro">Perro</option>
                  <option value="gato">Gato</option>
                  <option value="otro">Otro</option>
                </select>
              </div>
              <div class="col-md-6 mb-3" id="campo-raza" style="display:none;">
  <label class="form-label">Raza</label>
  <input
    type="text"
    id="raza"
    class="form-control"
    placeholder="Ej: Labrador, Callejero, etc"
  />
</div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Tamano</label>
                <select id="tamano" class="form-select">
                  <option value="">Seleccionar...</option>
                  <option value="Pequeno">Pequeno</option>
                  <option value="Mediano">Mediano</option>
                  <option value="Grande">Grande</option>
                </select>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Color</label>
                <input
                  type="text"
                  id="color"
                  class="form-control"
                  placeholder="Ej: Marron y blanco"
                />
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Zona o barrio *</label>
                <input
                  type="text"
                  id="zona"
                  class="form-control"
                  placeholder="Ej: Barrio San Antonio"
                />
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Fecha *</label>
              <input type="date" id="fecha" class="form-control" />
            </div>
            <div class="mb-3">
  <label class="form-label">Foto *</label>
  <input
  type="file"
  id="foto"
  name="foto"
  class="form-control"
  accept="image/*">
</div>
            
              <div class="mb-3">
              <label class="form-label">Comentarios</label>
              <textarea
                id="comentario"
                class="form-control"
                rows="3"
                placeholder="Comportamiento, senas particulares, datos utiles..."
              ></textarea>
            </div>

          <div class="mb-3">
  <label class="form-label">Ubicación exacta en el mapa</label>

  <div id="mapa-publicar"
       style="height:250px; border-radius:8px; border:1px solid #dee2e6;"></div>

  <small class="text-muted">
    * Hacé click en el mapa para marcar la ubicación exacta.
    <strong>Este campo es obligatorio.</strong>
  </small>
</div>

<button id="btn-guardar" class="btn btn-huellita w-100">
  Publicar caso
</button>
          </div>
        </div>
      </div>
    </div>

    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/comun.js"></script>
    <!-- Leaflet antes de publicar.js -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/publicar.js"></script>
    <script>
      generarNavbar("publicar");
      generarFooter();
    </script>
  </body>
</html>
