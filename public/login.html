<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Huellita - Acceso</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/estilos.css" rel="stylesheet">
</head>
<body>
  <div id="navbar"></div>

  <div class="container my-5">
    <div class="row justify-content-center g-4">

      <!-- Inicio de sesion (RP-02) -->
      <div class="col-md-5">
        <div class="card card-mascota p-4">
          <h2 class="h4 mb-3">Iniciar sesion</h2>
          <div id="msg-login"></div>
          <div class="mb-3">
            <label class="form-label">Correo electronico</label>
            <input type="email" id="login-correo" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">Contrasena</label>
            <input type="password" id="login-contrasena" class="form-control">
          </div>
          <button id="btn-login" class="btn btn-huellita w-100">Ingresar</button>
        </div>
      </div>

      <!-- Registro (RP-01) -->
      <div class="col-md-5" id="registro">
        <div class="card card-mascota p-4">
          <h2 class="h4 mb-3">Crear una cuenta</h2>
          <div id="msg-registro"></div>
          <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" id="reg-nombre" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">Correo electronico</label>
            <input type="email" id="reg-correo" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">Contrasena (minimo 6 caracteres)</label>
            <input type="password" id="reg-contrasena" class="form-control">
          </div>
          <button id="btn-registro" class="btn btn-huellita w-100">Registrarme</button>
        </div>
      </div>

    </div>
  </div>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/comun.js"></script>
  <script src="js/login.js"></script>
  <script>
    generarNavbar('login');
    generarFooter();
  </script>
</body>
</html>
