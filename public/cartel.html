<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Huellita - Cartel de busqueda</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/estilos.css" rel="stylesheet">
</head>
<body>
  <div id="navbar"></div>

  <div class="container my-5">
    <div class="text-center mb-4 no-imprimir">
      <button id="btn-imprimir" class="btn btn-huellita btn-lg">Imprimir cartel</button>
      <a href="#" id="volver" class="btn btn-outline-secondary btn-lg">Volver a la ficha</a>
    </div>

    <div id="cartel" class="cartel"></div>
  </div>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/comun.js"></script>
  <script>
    generarNavbar('');
    generarFooter();

    const idReporte = new URLSearchParams(window.location.search).get('id');
    document.getElementById('volver').href = 'ficha.html?id=' + idReporte;

    // RP-15: arma el cartel con los datos del reporte
    async function cargarCartel() {
      const cont = document.getElementById('cartel');
      try {
        const resp = await fetch('/reportes/' + idReporte);
        if (!resp.ok) {
          cont.innerHTML = '<p class="text-danger">No se encontro el reporte.</p>';
          return;
        }
        const r = await resp.json();
        const titulo = r.estado === 'Encontrada' ? 'SE ENCONTRO' : 'SE BUSCA';
        cont.innerHTML = `
          <h1>${titulo}</h1>
          <h2 class="text-center">${r.nombre_mascota || r.especie}</h2>
          <img src="${r.foto_url || 'img/sin-foto.svg'}" class="foto-cartel"
               alt="Mascota" onerror="this.src='img/sin-foto.svg'">
          <table class="table">
            <tr><th>Especie</th><td>${r.especie}</td></tr>
            <tr><th>Color</th><td>${r.color || '-'}</td></tr>
            <tr><th>Tamano</th><td>${r.tamano || '-'}</td></tr>
            <tr><th>Zona</th><td>${r.zona}</td></tr>
            <tr><th>Fecha</th><td>${r.fecha}</td></tr>
          </table>
          ${r.comentario ? `<p class="text-center"><em>${r.comentario}</em></p>` : ''}
          <p class="text-center mt-3"><strong>Si tenes informacion, ingresa a Huellita
            y busca el caso #${r.id}.</strong></p>
        `;
      } catch (err) {
        cont.innerHTML = '<p class="text-danger">Error al cargar el cartel.</p>';
      }
    }

    // CA: el boton imprime la pagina con window.print()
    document.getElementById('btn-imprimir').addEventListener('click', () => {
      window.print();
    });

    cargarCartel();
  </script>
</body>
</html>
