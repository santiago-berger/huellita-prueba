<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Huellita - Mascotas encontradas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/estilos.css" rel="stylesheet">
</head>
<body>
  <div id="navbar"></div>

  <div class="container my-5">
    <h2 class="seccion-titulo">Mascotas encontradas</h2>
    <p class="text-muted mb-4">Mascotas que fueron encontradas en la calle. Si reconoces a tu mascota, ingresa a su ficha.</p>
    <div id="listado" class="row g-4"></div>
  </div>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/comun.js"></script>
  <script>
    generarNavbar('encontradas');
    generarFooter();

    async function cargarEncontradas() {
      const cont = document.getElementById('listado');
      try {
        const resp = await fetch('/reportes?estado=Encontrada');
        const reportes = await resp.json();
        if (reportes.length === 0) {
          cont.innerHTML = '<div class="col-12"><div class="alert alert-info">Todavia no hay mascotas encontradas publicadas.</div></div>';
          return;
        }
        cont.innerHTML = reportes.map((r) => `
          <div class="col-md-4">
            <a href="ficha.html?id=${r.id}" class="text-decoration-none">
              <div class="card card-mascota">
                <img src="${r.foto_url || 'img/sin-foto.svg'}" class="foto" alt="Mascota"
                     onerror="this.src='img/sin-foto.svg'">
                <div class="card-body">
                  <h3 class="card-title h5">${r.especie} encontrado</h3>
                  <p class="mb-1 text-muted">${r.color || 'Sin color especificado'} &middot; ${r.zona}</p>
                  <p class="mb-2 small text-muted">Encontrada el ${r.fecha}</p>
                  <span class="badge-estado estado-encontrada">Encontrada</span>
                </div>
              </div>
            </a>
          </div>
        `).join('');
      } catch (err) {
        cont.innerHTML = '<div class="col-12"><div class="alert alert-danger">No se pudieron cargar las mascotas.</div></div>';
      }
    }
    cargarEncontradas();
  </script>
</body>
</html>
