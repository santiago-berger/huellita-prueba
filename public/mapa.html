<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Huellita - Mapa de mascotas</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      rel="stylesheet"
    />
    <link
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
      rel="stylesheet"
    />
    <link
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
      rel="stylesheet"
    />
    <link href="css/estilos.css" rel="stylesheet" />
    <style>
      #mapa {
        height: 560px;
        width: 100%;
        border-radius: 12px;
      }
      .leyenda {
        background: white;
        padding: 10px 14px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        font-size: 0.9rem;
      }
      .leyenda span {
        display: inline-block;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        margin-right: 6px;
        vertical-align: middle;
      }
      .punto-rojo {
        background: #dc3545;
      }
      .punto-verde {
        background: #198754;
      }
    </style>
  </head>
  <body>
    <div id="navbar"></div>

    <header class="hero py-4">
      <div class="container text-center">
        <h1 class="h3 mb-1">Mapa de mascotas</h1>
        <p class="mb-0">Visualizá mascotas perdidas y encontradas en Formosa</p>
      </div>
    </header>

    <main class="container my-4">
      <!-- Filtros -->
      <div class="card card-mascota p-3 mb-4">
        <div class="row g-2 align-items-end">
          <div class="col-md-4">
            <label class="form-label fw-semibold">Mostrar</label>
            <select id="filtro-estado" class="form-select">
              <option value="todas">Todas las mascotas</option>
              <option value="Perdida" selected>Solo perdidas</option>
              <option value="Encontrada">Solo encontradas</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">Especie</label>
            <select id="filtro-especie" class="form-select">
              <option value="">Todas las especies</option>
              <option value="perro">Perro</option>
              <option value="gato">Gato</option>
              <option value="otro">Otro</option>
            </select>
          </div>
          <div class="col-md-4">
            <button id="btn-filtrar" class="btn btn-huellita w-100">
              Aplicar filtros
            </button>
          </div>
        </div>
      </div>

      <!-- Leyenda y botón ubicación -->
      <div
        class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2"
      >
        <div class="leyenda d-inline-block">
          <span class="punto-rojo"></span> Mascota perdida &nbsp;
          <span class="punto-verde"></span> Mascota encontrada
        </div>
        <button id="btn-mi-ubicacion" class="btn btn-outline-secondary btn-sm">
          📍 Mi ubicación
        </button>
      </div>

      <!-- Mapa -->
      <div id="mapa"></div>

      <!-- Contador -->
      <p id="contador" class="text-muted mt-2 small"></p>
    </main>

    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="js/comun.js"></script>
    <script src="js/mapa.js"></script>
  </body>
</html>
